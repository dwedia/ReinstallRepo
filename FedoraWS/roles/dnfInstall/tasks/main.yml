---
- name: Get Fedora Version
  command: "rpm -E %fedora"
  register: fedora_version

- name: Install RPM Fusion Free
  dnf:
    name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ fedora_version.stdout }}.noarch.rpm"
    state: present

- name: Install RPM Fusion NonFree
  dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ fedora_version.stdout }}.noarch.rpm"
    state: present

- name: Upgrade all packages
  dnf: 
    name: "*"
    state: latest

- name: install needed software, that can't run in distrobox
  become: yes
  dnf:
    pkg:
      - distrobox
      - syncthing
      - i3
      - rofi
      - vim
      - terminator
      - clamav
      - flatpak
      - xclip
      - lxpolkit
      - timeshift

- name: remove preinstalled apps
  become: yes
  dnf:
    name: "{{ item }}"
    state: absent
  with_items:
    - libreoffice
    - libreoffice-common
    - thunderbird
    - vlc
    - gnome-2048
    - gnome-sudoku
    - gnome-robots
    - gnome-nibbles
    - gnome-chess
    - gnome-klotski
    - gnome-mahjongg
    - gnome-mines
    - gnome-taquin
    - gnome-tetravex
    - firefox-esr
    - firefox
